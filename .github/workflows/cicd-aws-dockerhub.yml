name: CI/CD AWS EC2 via Docker Hub

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  REGISTRY: docker.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute image tag
        id: vars
        run: echo "image_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push eureka-server
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/eureka-server/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/careerbridge-eureka-server:${{ steps.vars.outputs.image_tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/careerbridge-eureka-server:latest

      - name: Build and push config-server
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/config-server/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/careerbridge-config-server:${{ steps.vars.outputs.image_tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/careerbridge-config-server:latest

      - name: Build and push api-gateway
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/api-gateway/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/careerbridge-api-gateway:${{ steps.vars.outputs.image_tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/careerbridge-api-gateway:latest

      - name: Build and push auth-service
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/auth-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/careerbridge-auth-service:${{ steps.vars.outputs.image_tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/careerbridge-auth-service:latest

      - name: Build and push job-service
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/job-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/careerbridge-job-service:${{ steps.vars.outputs.image_tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/careerbridge-job-service:latest

      - name: Build and push application-service
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/application-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/careerbridge-application-service:${{ steps.vars.outputs.image_tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/careerbridge-application-service:latest

      - name: Build and push file-service
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/file-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/careerbridge-file-service:${{ steps.vars.outputs.image_tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/careerbridge-file-service:latest

      - name: Build and push notification-service
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/notification-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/careerbridge-notification-service:${{ steps.vars.outputs.image_tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/careerbridge-notification-service:latest

      - name: Build and push admin-service
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/admin-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/careerbridge-admin-service:${{ steps.vars.outputs.image_tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/careerbridge-admin-service:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/careerbridge-frontend:${{ steps.vars.outputs.image_tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/careerbridge-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy on AWS EC2 through SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USER }}
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          port: ${{ secrets.AWS_EC2_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            APP_DIR="${{ secrets.AWS_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then
              APP_DIR="$HOME/careerbridge"
            fi

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Repository not found at $APP_DIR"
              exit 1
            fi

            cd "$APP_DIR"
            git fetch origin
            git checkout main
            git reset --hard origin/main

            : > .env
            printf '%s\n' "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" >> .env
            printf '%s\n' "IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}" >> .env
            printf '%s\n' "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            printf '%s\n' "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
            printf '%s\n' "MYSQL_USERNAME=${{ secrets.MYSQL_USERNAME }}" >> .env
            printf '%s\n' "MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}" >> .env
            printf '%s\n' "CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}" >> .env
            printf '%s\n' "CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}" >> .env
            printf '%s\n' "CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}" >> .env
            printf '%s\n' "MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}" >> .env
            printf '%s\n' "MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}" >> .env
            printf '%s\n' "TRACING_ENABLED=false" >> .env
            printf '%s\n' "TRACING_SAMPLING_PROBABILITY=0.0" >> .env
            printf '%s\n' "ZIPKIN_ENDPOINT=http://zipkin:9411/api/v2/spans" >> .env

            chmod 600 .env

            docker compose -f deploy/docker-compose.aws.yml down --remove-orphans || true
            docker compose -f deploy/docker-compose.aws.yml pull
            docker compose -f deploy/docker-compose.aws.yml up -d --remove-orphans
            docker image prune -f
